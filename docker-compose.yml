services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: alik
      POSTGRES_PASSWORD: alik
      POSTGRES_DB: alik
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alik"]
      interval: 2s
      timeout: 3s
      retries: 15

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15

  # Phase 2: temporal graph. Redis-family, but its own service so Phase 1's Redis
  # is untouched. Host 6380 -> container 6379 to avoid clashing with `redis`.
  falkordb:
    image: falkordb/falkordb:latest
    ports:
      - "6380:6379"
    volumes:
      - falkordata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15

  # The job-matching microservice's OWN Postgres (recommendation log + engagement flag).
  # Host 5433 -> container 5432 so it doesn't clash with the brain's `postgres`.
  matching-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: alik
      POSTGRES_PASSWORD: alik
      POSTGRES_DB: matching
    ports:
      - "5433:5432"
    volumes:
      - matchingdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alik"]
      interval: 2s
      timeout: 3s
      retries: 15

  # The people-matching ("connections") microservice's OWN Postgres (all match state).
  # Host 5434 -> container 5432 (5432/5433 are taken by the brain + matching).
  connections-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: alik
      POSTGRES_PASSWORD: alik
      POSTGRES_DB: connections
    ports:
      - "5434:5432"
    volumes:
      - connectionsdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alik"]
      interval: 2s
      timeout: 3s
      retries: 15

  # The rendezvous (meeting-coordination) microservice's OWN Postgres (all meet state).
  # Host 5435 -> container 5432 (5432/5433/5434 are taken by brain/matching/connections).
  rendezvous-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: alik
      POSTGRES_PASSWORD: alik
      POSTGRES_DB: rendezvous
    ports:
      - "5435:5432"
    volumes:
      - rendezvousdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alik"]
      interval: 2s
      timeout: 3s
      retries: 15

volumes:
  pgdata:
  falkordata:
  matchingdata:
  connectionsdata:
  rendezvousdata:
